# fly.toml app configuration file generated for playground-flywheel on 2026-04-01T17:22:04-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'playground-flywheel'
primary_region = 'sjc'

[build]

[env]
  DB_PATH = '/data/playground.db'
  PORT = '8080'
  SEED_PATH = './data.json'

[[mounts]]
  source = 'playground_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playground</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f1117;
      color: #e2e4e9;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
      line-height: 1.7;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .intro {
      color: #b0b5bd;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }

    /* ── Pulse bar ── */
    .pulse {
      display: flex;
      gap: 1.25rem;
      flex-wrap: wrap;
      padding: 0.9rem 1.25rem;
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .pulse-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .pulse-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .pulse-rising  .pulse-dot { background: #34d399; }
    .pulse-steady  .pulse-dot { background: #60a5fa; }
    .pulse-stalling .pulse-dot { background: #fbbf24; }
    .pulse-dormant .pulse-dot { background: #555b66; }

    .pulse-rising  .pulse-count { color: #34d399; }
    .pulse-steady  .pulse-count { color: #60a5fa; }
    .pulse-stalling .pulse-count { color: #fbbf24; }
    .pulse-dormant .pulse-count { color: #555b66; }

    .pulse-label { color: #bcc3cd; }

    /* ── Check-in bar (hidden until data) ── */
    .checkin-bar {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      padding: 0.9rem 1.25rem;
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 10px;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }

    .checkin-bar .label {
      color: #bcc3cd;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: block;
      margin-bottom: 2px;
    }

    .checkin-bar .value { color: #e2e4e9; font-weight: 600; }
    .checkin-bar .score { font-size: 1.1rem; }
    .score-high { color: #34d399; }
    .score-mid  { color: #fbbf24; }
    .score-low  { color: #f87171; }
    .checkin-bar .word { color: #a78bfa; font-style: italic; }

    .hidden { display: none; }

    /* ── Section headers ── */
    h2 {
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #c4cbd5;
      margin: 2rem 0 0.6rem;
    }

    /* ── Table ── */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    thead th {
      text-align: left;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #c4cbd5;
      padding: 0.6rem 0.75rem;
      background: #1a1d27;
      border-bottom: 2px solid #2a2d3a;
    }

    tbody tr.row {
      cursor: pointer;
      transition: background 0.15s;
    }

    tbody tr.row:hover { background: #1a1d27; }

    tbody td {
      padding: 0.75rem 0.75rem;
      vertical-align: top;
      border-bottom: 1px solid #1e2130;
      color: #c9cdd5;
    }

    .col-name {
      font-weight: 600;
      color: #e2e4e9;
      white-space: nowrap;
    }

    .col-name a {
      color: #60a5fa;
      text-decoration: none;
      margin-left: 4px;
      font-size: 0.85em;
    }

    .col-chevron {
      width: 24px;
      color: #555b66;
      text-align: center;
      font-size: 0.8rem;
      transition: transform 0.15s;
    }

    tr.row.expanded .col-chevron { transform: rotate(90deg); }

    .col-kind {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
      color: #bcc3cd;
    }

    .col-momentum { white-space: nowrap; }
    .momentum-rising   { color: #34d399; }
    .momentum-steady   { color: #60a5fa; }
    .momentum-stalling { color: #fbbf24; }
    .momentum-dormant  { color: #555b66; }

    .col-milestones { font-size: 0.9rem; }

    .milestone-tag {
      display: inline-block;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 0.82rem;
      color: #34d399;
      margin: 1px 2px;
    }

    .col-updated {
      white-space: nowrap;
      color: #bcc3cd;
      font-size: 0.9rem;
    }

    /* ── Expanded detail row ── */
    tr.detail-row td {
      background: #141620;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #1e2130;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .detail-label {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #c4cbd5;
      margin-bottom: 0.3rem;
    }

    .detail-text {
      font-size: 0.95rem;
      color: #c9cdd5;
      margin-bottom: 0.75rem;
    }

    .log-entry {
      font-size: 0.92rem;
      color: #bcc3cd;
      margin-bottom: 0.35rem;
    }

    .log-date { color: #bcc3cd; margin-right: 0.4rem; }
    .log-rec { color: #60a5fa; }
    .log-rec::before { content: "\2192 "; color: #60a5fa; }

    /* ── Wins ── */
    .wins-list { list-style: none; padding: 0; }

    .win-item {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid #1e2130;
      font-size: 0.95rem;
      color: #c9cdd5;
    }

    .win-item:hover { background: #1a1d27; }
    .win-date { flex-shrink: 0; color: #bcc3cd; font-size: 0.9rem; }
    .win-icon { color: #34d399; flex-shrink: 0; }

    /* ── Tasks ── */
    .task-group-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: #bcc3cd;
      padding: 0.6rem 0.75rem 0.25rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .task-list { list-style: none; padding: 0; }

    .task-item {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid #1e2130;
      font-size: 0.95rem;
      color: #c9cdd5;
    }

    .task-item:hover { background: #1a1d27; }

    .task-status {
      flex-shrink: 0;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-top: 7px;
    }

    .task-status-pending { background: #fbbf24; }
    .task-status-done { background: #34d399; }

    /* ── Mobile ── */
    @media (max-width: 700px) {
      body { padding: 24px 16px; }
      table, thead, tbody, tr, td { display: block; width: 100%; }
      thead { display: none; }

      .pulse { flex-direction: row; gap: 1rem; }
      .checkin-bar { flex-direction: column; gap: 0.75rem; }

      tbody tr.row {
        background: #1a1d27;
        border: 1px solid #2a2d3a;
        border-radius: 8px;
        margin-bottom: 0.75rem;
        padding: 0.8rem 1rem;
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 0.3rem 0.6rem;
      }

      tbody tr.row:hover { background: #1a1d27; }
      tbody tr.row td { border: none; padding: 0; }

      .col-name { font-size: 1.05rem; width: 100%; }
      .col-kind { display: inline; }
      .col-momentum { display: inline; }
      .col-milestones { width: 100%; }
      .col-updated { width: 100%; }
      .col-chevron { display: none; }

      tr.detail-row { margin-top: -0.75rem; margin-bottom: 0.75rem; }
      tr.detail-row td {
        border: 1px solid #2a2d3a;
        border-top: none;
        border-radius: 0 0 8px 8px;
        padding: 0.75rem 1rem;
      }
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <h1>Playground</h1>
  <p class="intro">A personal flywheel. Build, act, learn, repeat.</p>

  <div class="pulse" id="pulse"></div>

  <div class="checkin-bar hidden" id="checkin-bar"></div>

  <h2>Tracker</h2>
  <table>
    <thead>
      <tr>
        <th></th>
        <th>Name</th>
        <th>Momentum</th>
        <th>Milestones</th>
        <th>Updated</th>
      </tr>
    </thead>
    <tbody id="tracker-body"></tbody>
  </table>

  <h2 id="tasks-header">Agent Backlog</h2>
  <div id="task-container"></div>

  <div id="wins-section" class="hidden">
    <h2>Wins</h2>
    <ul class="wins-list" id="wins-list"></ul>
  </div>

  <script>
    const MOMENTUM_ARROWS = { rising: '\u2191', steady: '\u2192', stalling: '\u2193', dormant: '\u00b7' };
    const MOMENTUM_ORDER = { rising: 0, steady: 1, stalling: 2, dormant: 3 };

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function formatTargetDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
    }

    function scoreClass(n) {
      if (n >= 7) return 'score-high';
      if (n >= 4) return 'score-mid';
      return 'score-low';
    }

    function renderPulse(items) {
      const counts = { rising: 0, steady: 0, stalling: 0, dormant: 0 };
      items.forEach(i => { counts[i.momentum] = (counts[i.momentum] || 0) + 1; });

      const el = document.getElementById('pulse');
      el.innerHTML = ['rising', 'steady', 'stalling', 'dormant']
        .filter(m => counts[m] > 0)
        .map(m => `<div class="pulse-item pulse-${m}"><span class="pulse-dot"></span><span class="pulse-count">${counts[m]}</span> <span class="pulse-label">${m}</span></div>`)
        .join('');
    }

    function renderCheckin(data) {
      const checkins = data.check_ins || [];
      const latest = checkins[checkins.length - 1];
      if (!latest || (!latest.body && !latest.mind && !latest.social && !latest.feeling)) return;

      const bar = document.getElementById('checkin-bar');
      bar.classList.remove('hidden');
      let html = '';
      if (latest.body != null) html += `<div><span class="label">Body</span><span class="value score ${scoreClass(latest.body)}">${latest.body}/10</span></div>`;
      if (latest.mind != null) html += `<div><span class="label">Mind</span><span class="value score ${scoreClass(latest.mind)}">${latest.mind}/10</span></div>`;
      if (latest.social != null) html += `<div><span class="label">Social</span><span class="value score ${scoreClass(latest.social)}">${latest.social}/10</span></div>`;
      if (latest.feeling) html += `<div><span class="label">Feeling</span><span class="value word">${latest.feeling}</span></div>`;
      if (latest.more_of) html += `<div><span class="label">More of</span><span class="value">${latest.more_of}</span></div>`;
      if (latest.less_of) html += `<div><span class="label">Less of</span><span class="value">${latest.less_of}</span></div>`;
      html += `<div><span class="label">Date</span><span class="value" style="color:#bcc3cd">${formatDate(latest.date)}</span></div>`;
      bar.innerHTML = html;
    }

    function renderRow(item) {
      const arrow = MOMENTUM_ARROWS[item.momentum] || '\u00b7';
      const momentumClass = 'momentum-' + item.momentum;
      const nameExtra = item.url ? ` <a href="${item.url}" target="_blank">\u2197</a>` : '';
      const milestoneHtml = (item.milestones || []).map(m => `<span class="milestone-tag">${m.label}</span>`).join('');

      const row = document.createElement('tr');
      row.className = 'row';
      row.innerHTML = `
        <td class="col-chevron">\u25B8</td>
        <td class="col-name">${item.name}${nameExtra}</td>
        <td class="col-momentum ${momentumClass}">${arrow} ${item.momentum}</td>
        <td class="col-milestones">${milestoneHtml || '<span style="color:#2a2d3a">\u2014</span>'}</td>
        <td class="col-updated">${formatDate(item.last_updated)}</td>
      `;

      const detailRow = document.createElement('tr');
      detailRow.className = 'detail-row hidden';

      const logEntries = (item.log || []).slice().reverse()
        .map(e => {
          const isRec = e.type === 'recommendation';
          return `<div class="log-entry ${isRec ? 'log-rec' : ''}"><span class="log-date">${formatDate(e.date)}</span>${e.note}</div>`;
        }).join('');

      let leftCol = '';
      leftCol += `<div class="detail-label">Focus</div><div class="detail-text">${item.focus}</div>`;
      leftCol += `<div class="detail-label">Next step</div><div class="detail-text">${item.next}</div>`;
      if (item.target_date) leftCol += `<div class="detail-label">Target</div><div class="detail-text">${formatTargetDate(item.target_date)}</div>`;
      if (item.success_criteria) leftCol += `<div class="detail-label">Success criteria</div><div class="detail-text">${item.success_criteria}</div>`;

      let rightCol = '';
      rightCol += `<div class="detail-label">Log</div>${logEntries || '<div class="log-entry" style="color:#bcc3cd">No entries yet.</div>'}`;
      if ((item.milestones || []).length) {
        rightCol += `<div class="detail-label" style="margin-top:0.75rem">Milestones</div>`;
        rightCol += item.milestones.map(m => `<div class="log-entry"><span class="log-date">${formatDate(m.date)}</span><span style="color:#34d399">${m.label}</span></div>`).join('');
      }

      detailRow.innerHTML = `<td colspan="5"><div class="detail-grid"><div>${leftCol}</div><div>${rightCol}</div></div></td>`;

      row.addEventListener('click', function(e) {
        if (e.target.tagName === 'A') return;
        row.classList.toggle('expanded');
        detailRow.classList.toggle('hidden');
      });

      return [row, detailRow];
    }

    function renderWins(wins) {
      if (!wins || wins.length === 0) return;
      document.getElementById('wins-section').classList.remove('hidden');
      const list = document.getElementById('wins-list');
      wins.slice().reverse().forEach(w => {
        const li = document.createElement('li');
        li.className = 'win-item';
        li.innerHTML = `<span class="win-icon">\u2605</span><span class="win-date">${formatDate(w.date)}</span><span>${w.note}</span>`;
        list.appendChild(li);
      });
    }

    function renderTasks(taskData) {
      const allTasks = [...(taskData.tasks || []), ...(taskData.system_tasks || [])];
      const pending = allTasks.filter(t => t.status === 'pending');
      const done = allTasks.filter(t => t.status === 'done');
      const container = document.getElementById('task-container');
      const header = document.getElementById('tasks-header');

      header.innerHTML = `Agent Backlog <span style="font-weight:400;font-size:0.78rem;letter-spacing:0;text-transform:none;color:#bcc3cd">${pending.length} pending · ${done.length} done</span>`;

      if (pending.length === 0) {
        container.innerHTML = '<div style="color:#34d399;padding:0.5rem 0.75rem;font-style:italic">All clear.</div>';
        return;
      }

      const ul = document.createElement('ul');
      ul.className = 'task-list';
      pending.forEach(t => {
        const li = document.createElement('li');
        li.className = 'task-item';
        li.innerHTML = `<span class="task-status task-status-pending"></span><span>${t.task}</span>`;
        ul.appendChild(li);
      });
      container.appendChild(ul);
    }

    Promise.all([
      fetch('data.json').then(r => r.json()),
      fetch('tasks.json').then(r => r.json())
    ]).then(([data, taskData]) => {
      data.items.sort((a, b) => (MOMENTUM_ORDER[a.momentum] || 3) - (MOMENTUM_ORDER[b.momentum] || 3));
      renderPulse(data.items);
      renderCheckin(data);
      const tbody = document.getElementById('tracker-body');
      data.items.forEach(item => {
        const [row, detailRow] = renderRow(item);
        tbody.appendChild(row);
        tbody.appendChild(detailRow);
      });
      renderWins(data.wins || []);
      renderTasks(taskData);
    }).catch(err => {
      console.error('Failed to load data:', err);
    });
  </script>

</body>
</html>

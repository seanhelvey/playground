<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <title>Playground ✦</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f1117; color: #e2e4e9;
      max-width: 900px; margin: 0 auto; padding: 40px 20px 60px; line-height: 1.7;
    }
    h1 {
      font-size: 1.6rem; font-weight: 700; margin-bottom: 0.4rem;
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .intro { color: #b0b5bd; font-size: 0.95rem; margin-bottom: 1.5rem; }
    .hidden { display: none; }
    h2 { font-size: 0.82rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #c4cbd5; margin: 2rem 0 0.6rem; }

    /* ── Pulse ── */
    .pulse {
      display: flex; gap: 1.25rem; flex-wrap: wrap;
      padding: 0.9rem 1.25rem; background: #1a1d27;
      border: 1px solid #2a2d3a; border-radius: 10px;
      margin-bottom: 1.5rem; font-size: 0.95rem; font-weight: 600;
    }
    .pulse-item { display: flex; align-items: center; gap: 0.4rem; }
    .pulse-dot { width: 10px; height: 10px; border-radius: 50%; }
    .pulse-rising .pulse-dot { background: #34d399; }
    .pulse-steady .pulse-dot { background: #60a5fa; }
    .pulse-stalling .pulse-dot { background: #fbbf24; }
    .pulse-dormant .pulse-dot { background: #555b66; }
    .pulse-rising .pulse-count { color: #34d399; }
    .pulse-steady .pulse-count { color: #60a5fa; }
    .pulse-stalling .pulse-count { color: #fbbf24; }
    .pulse-dormant .pulse-count { color: #555b66; }
    .pulse-label { color: #bcc3cd; }

    /* ── Latest check-in bar ── */
    .checkin-bar {
      display: flex; gap: 1.5rem; flex-wrap: wrap;
      padding: 0.9rem 1.25rem; background: #1a1d27;
      border: 1px solid #2a2d3a; border-radius: 10px;
      margin-bottom: 1.5rem; font-size: 0.9rem;
    }
    .checkin-bar .label { color: #bcc3cd; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 2px; }
    .checkin-bar .value { color: #e2e4e9; font-weight: 600; }
    .score-high { color: #34d399; } .score-mid { color: #fbbf24; } .score-low { color: #f87171; }
    .checkin-bar .word { color: #a78bfa; font-style: italic; }

    /* ── Check-in section ── */
    .ci-section {
      background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 10px;
      padding: 1rem 1.25rem; margin-bottom: 1.5rem;
    }
    .ci-row {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.5rem 0; border-bottom: 1px solid #1e2130;
    }
    .ci-row:last-child { border-bottom: none; }

    /* Toggle for Core/Habit */
    .ci-toggle {
      width: 40px; height: 24px; border-radius: 12px;
      background: #2a2d3a; border: none; cursor: pointer;
      position: relative; flex-shrink: 0; transition: background 0.15s;
      touch-action: manipulation;
    }
    .ci-toggle::after {
      content: ''; position: absolute; top: 3px; left: 3px;
      width: 18px; height: 18px; border-radius: 50%;
      background: #555b66; transition: all 0.15s;
    }
    .ci-toggle.on { background: #34d399; }
    .ci-toggle.on::after { left: 19px; background: #0f1117; }

    .ci-name { font-weight: 600; font-size: 0.95rem; color: #e2e4e9; flex: 1; }
    .ci-type { font-size: 0.72rem; color: #555b66; text-transform: uppercase; letter-spacing: 0.06em; }
    .ci-note-toggle { background: none; border: none; color: #555b66; font-size: 0.82rem; cursor: pointer; padding: 2px 6px; }
    .ci-note-toggle:hover { color: #60a5fa; }
    .ci-note-area { display: none; padding: 0.4rem 0 0.2rem 0; }
    .ci-note-area.open { display: block; }
    .ci-note-input {
      width: 100%; padding: 8px; background: #0f1117;
      border: 1px solid #2a2d3a; border-radius: 6px;
      color: #e2e4e9; font-size: 0.9rem; font-family: inherit; resize: none;
    }

    /* Counter */
    .ci-counter { display: flex; align-items: center; gap: 0.5rem; margin-left: auto; }
    .ci-counter-btn {
      width: 32px; height: 32px; border-radius: 50%; border: 1px solid #2a2d3a;
      background: #1a1d27; color: #e2e4e9; font-size: 1.1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      touch-action: manipulation;
    }
    .ci-counter-btn:active { background: #2a2d3a; }
    .ci-counter-val { min-width: 3ch; text-align: center; font-weight: 600; font-size: 0.95rem; color: #34d399; }

    /* Slider items */
    .ci-slider { display: flex; align-items: center; gap: 0.5rem; margin-left: auto; min-width: 140px; }
    .ci-slider-input { flex: 1; accent-color: #a78bfa; }
    .ci-slider-val { min-width: 2ch; text-align: center; font-weight: 600; font-size: 0.95rem; color: #a78bfa; }

    /* Goal group headers */
    .ci-group { margin-bottom: 0.25rem; }
    .ci-group-header {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.1em; color: #a78bfa; padding: 0.6rem 0 0.2rem;
      border-top: 1px solid #2a2d3a; margin-top: 0.25rem;
    }
    .ci-group .ci-row { padding-left: 0.5rem; }

    /* Note items — always visible input */
    .ci-note-inline {
      width: 100%; padding: 7px 10px; background: #0f1117;
      border: 1px solid #2a2d3a; border-radius: 6px;
      color: #e2e4e9; font-size: 0.9rem; font-family: inherit;
      margin-top: 0.3rem;
    }

    /* Win + reflection sections */
    .ci-extra {
      border-top: 1px solid #2a2d3a; margin-top: 0.75rem; padding-top: 0.75rem;
    }
    .ci-extra-header {
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; user-select: none;
    }
    .ci-extra-title { font-weight: 600; font-size: 0.95rem; }
    .ci-extra-hint { font-size: 0.78rem; color: #555b66; }
    .ci-extra-body { display: none; padding-top: 0.5rem; }
    .ci-extra.open .ci-extra-body { display: block; }

    .form-label { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #c4cbd5; display: block; margin-bottom: 0.3rem; margin-top: 0.6rem; }
    .form-input {
      width: 100%; padding: 8px; background: #0f1117;
      border: 1px solid #2a2d3a; border-radius: 6px;
      color: #e2e4e9; font-size: 0.9rem; font-family: inherit;
    }
    .form-range-row { display: flex; align-items: center; gap: 0.75rem; }
    .form-range { flex: 1; accent-color: #60a5fa; }
    .form-range-val { min-width: 2ch; text-align: center; font-weight: 600; font-size: 1.1rem; }

    .ci-submit {
      width: 100%; padding: 12px; margin-top: 1rem;
      background: #60a5fa; border: none; border-radius: 8px;
      color: #0f1117; font-weight: 700; font-size: 1rem; cursor: pointer;
    }
    .ci-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .ci-msg { text-align: center; margin-top: 0.5rem; font-size: 0.9rem; color: #34d399; }
    .ci-msg.error { color: #f87171; }
    .ci-indicator { font-size: 0.85rem; color: #34d399; min-width: 1.5ch; margin-left: auto; }
    .ci-indicator.error { color: #f87171; }

    /* ── Tracker table ── */
    table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
    thead th { text-align: left; font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #c4cbd5; padding: 0.6rem 0.75rem; background: #1a1d27; border-bottom: 2px solid #2a2d3a; }
    tbody tr.row { cursor: pointer; transition: background 0.15s; }
    tbody tr.row:hover { background: #1a1d27; }
    tbody td { padding: 0.75rem 0.75rem; vertical-align: top; border-bottom: 1px solid #1e2130; color: #c9cdd5; }
    .col-name { font-weight: 600; color: #e2e4e9; white-space: nowrap; }
    .col-name a { color: #60a5fa; text-decoration: none; margin-left: 4px; font-size: 0.85em; }
    .col-chevron { width: 24px; color: #555b66; text-align: center; font-size: 0.8rem; transition: transform 0.15s; }
    tr.row.expanded .col-chevron { transform: rotate(90deg); }
    .col-momentum { white-space: nowrap; }
    .momentum-rising { color: #34d399; }
    .momentum-steady { color: #60a5fa; }
    .momentum-stalling { color: #fbbf24; }
    .momentum-dormant { color: #555b66; }
    .col-milestones { font-size: 0.9rem; }
    .milestone-tag { display: inline-block; background: #1e293b; border: 1px solid #334155; border-radius: 4px; padding: 1px 6px; font-size: 0.82rem; color: #34d399; margin: 1px 2px; }
    .col-updated { white-space: nowrap; color: #bcc3cd; font-size: 0.9rem; }

    tr.detail-row td { background: #141620; padding: 0.75rem 1rem; border-bottom: 1px solid #1e2130; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .detail-label { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #c4cbd5; margin-bottom: 0.3rem; }
    .detail-text { font-size: 0.95rem; color: #c9cdd5; margin-bottom: 0.75rem; }
    .log-entry { font-size: 0.92rem; color: #bcc3cd; margin-bottom: 0.35rem; }
    .log-date { color: #bcc3cd; margin-right: 0.4rem; }
    .log-rec { color: #60a5fa; }
    .log-rec::before { content: "\2192 "; color: #60a5fa; }

    /* ── Wins ── */
    .wins-list { list-style: none; padding: 0; }
    .win-item { display: flex; align-items: flex-start; gap: 0.6rem; padding: 0.5rem 0.75rem; border-bottom: 1px solid #1e2130; font-size: 0.95rem; color: #c9cdd5; }
    .win-date { flex-shrink: 0; color: #bcc3cd; font-size: 0.9rem; }
    .win-icon { color: #34d399; flex-shrink: 0; }

    /* ── Activity log ── */
    #activity-log {
      background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 10px;
      overflow: hidden;
    }
    .al-entry {
      display: flex; align-items: baseline; gap: 0.6rem;
      padding: 0.55rem 1rem; border-bottom: 1px solid #1e2130;
      font-size: 0.88rem;
    }
    .al-entry:last-child { border-bottom: none; }
    .al-date { color: #555b66; white-space: nowrap; flex-shrink: 0; font-size: 0.78rem; }
    .al-item { color: #60a5fa; flex-shrink: 0; }
    .al-note { color: #c9cdd5; flex: 1; }
    .al-more {
      display: block; width: 100%; padding: 0.6rem;
      background: none; border: none; border-top: 1px solid #2a2d3a;
      color: #555b66; font-size: 0.82rem; cursor: pointer; text-align: center;
    }
    .al-more:hover { color: #bcc3cd; }

    /* ── Mobile ── */
    @media (max-width: 700px) {
      body { padding: 24px 16px 60px; }
      table, thead, tbody, tr, td { display: block; width: 100%; }
      thead { display: none; }
      .checkin-bar { flex-direction: column; gap: 0.75rem; }
      tbody tr.row {
        background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 8px;
        margin-bottom: 0.75rem; padding: 0.8rem 1rem;
        display: flex; flex-wrap: wrap; align-items: baseline; gap: 0.3rem 0.6rem;
      }
      tbody tr.row td { border: none; padding: 0; }
      .col-name { font-size: 1.05rem; width: 100%; }
      .col-momentum { display: inline; }
      .col-milestones { width: 100%; }
      .col-updated { width: 100%; }
      .col-chevron { display: none; }
      tr.detail-row { margin-top: -0.75rem; margin-bottom: 0.75rem; }
      tr.detail-row td { border: 1px solid #2a2d3a; border-top: none; border-radius: 0 0 8px 8px; padding: 0.75rem 1rem; }
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <h1>Playground</h1>
  <p class="intro">A personal flywheel. Build, act, learn, repeat.</p>

  <h2>Check-in</h2>
  <div class="ci-section" id="checkin-section"></div>

  <h2 style="margin-top:2.5rem">Recent Activity</h2>
  <div id="activity-log"></div>

  <script>
    /* ── Auth ── */
    function showLogin() {
      document.body.innerHTML = '';
      const div = document.createElement('div');
      div.style.cssText = 'max-width:360px;margin:80px auto;padding:24px;';
      div.innerHTML = `
        <h1 style="background:linear-gradient(135deg,#a78bfa,#60a5fa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1.5rem">Playground</h1>
        <div id="auth-msg" style="color:#f87171;margin-bottom:1rem;display:none"></div>
        <input id="auth-email" type="email" placeholder="Email" style="width:100%;padding:10px;margin-bottom:10px;background:#1a1d27;border:1px solid #2a2d3a;border-radius:6px;color:#e2e4e9;font-size:1rem">
        <input id="auth-pass" type="password" placeholder="Password" style="width:100%;padding:10px;margin-bottom:16px;background:#1a1d27;border:1px solid #2a2d3a;border-radius:6px;color:#e2e4e9;font-size:1rem">
        <button id="auth-login" style="width:100%;padding:10px;background:#60a5fa;border:none;border-radius:6px;color:#0f1117;font-weight:600;font-size:1rem;cursor:pointer;margin-bottom:8px">Log in</button>
        <button id="auth-register" style="width:100%;padding:10px;background:transparent;border:1px solid #2a2d3a;border-radius:6px;color:#bcc3cd;font-size:0.9rem;cursor:pointer">Register</button>`;
      document.body.appendChild(div);
      async function doAuth(endpoint) {
        const email = document.getElementById('auth-email').value;
        const pass = document.getElementById('auth-pass').value;
        const msg = document.getElementById('auth-msg');
        const res = await fetch(endpoint, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({email, password: pass}) });
        if (res.ok) location.reload();
        else { msg.style.display = 'block'; msg.textContent = await res.text(); }
      }
      document.getElementById('auth-login').onclick = () => doAuth('/api/login');
      document.getElementById('auth-register').onclick = () => doAuth('/api/register');
    }

    /* ── Helpers ── */
    const MOMENTUM_ARROWS = { rising: '\u2191', steady: '\u2192', stalling: '\u2193', dormant: '\u00b7' };
    const MOMENTUM_ORDER = { rising: 0, steady: 1, stalling: 2, dormant: 3 };
    function fmtDate(s) { return new Date(s + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
    function fmtTarget(s) { return s ? new Date(s + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', year: 'numeric' }) : ''; }
    function scoreClass(n) { return n >= 7 ? 'score-high' : n >= 4 ? 'score-mid' : 'score-low'; }

    /* ── Renders ── */
    function renderPulse(items) {
      const c = { rising: 0, steady: 0, stalling: 0, dormant: 0 };
      items.forEach(i => c[i.momentum]++);
      document.getElementById('pulse').innerHTML = ['rising','steady','stalling','dormant']
        .filter(m => c[m]).map(m => `<div class="pulse-item pulse-${m}"><span class="pulse-dot"></span><span class="pulse-count">${c[m]}</span> <span class="pulse-label">${m}</span></div>`).join('');
    }

    function renderCheckinBar(checkins) {
      const latest = checkins[0];
      if (!latest) return;
      const bar = document.getElementById('checkin-bar');
      bar.classList.remove('hidden');
      let h = '';
      if (latest.body != null) h += `<div><span class="label">Body</span><span class="value score ${scoreClass(latest.body)}">${latest.body}/10</span></div>`;
      if (latest.mind != null) h += `<div><span class="label">Mind</span><span class="value score ${scoreClass(latest.mind)}">${latest.mind}/10</span></div>`;
      if (latest.social != null) h += `<div><span class="label">Social</span><span class="value score ${scoreClass(latest.social)}">${latest.social}/10</span></div>`;
      if (latest.feeling) h += `<div><span class="label">Feeling</span><span class="value word">${latest.feeling}</span></div>`;
      if (latest.more_of) h += `<div><span class="label">More of</span><span class="value">${latest.more_of}</span></div>`;
      if (latest.less_of) h += `<div><span class="label">Less of</span><span class="value">${latest.less_of}</span></div>`;
      h += `<div><span class="label">Date</span><span class="value" style="color:#bcc3cd">${fmtDate(latest.date)}</span></div>`;
      bar.innerHTML = h;
    }

    /* ── Check-in section ── */
    const _d = new Date();
    const today = `${_d.getFullYear()}-${String(_d.getMonth()+1).padStart(2,'0')}-${String(_d.getDate()).padStart(2,'0')}`;

    async function autoSaveLog(name, note, ind) {
      if (ind) ind.textContent = '·';
      const res = await fetch(`/api/items/${encodeURIComponent(name)}/log`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ note, date: today })
      });
      if (ind) {
        if (res.ok) {
          ind.textContent = '✓'; ind.classList.remove('error');
          setTimeout(() => { ind.textContent = ''; ind.classList.remove('error'); }, 1500);
        } else {
          res.text().then(t => {
            ind.textContent = `✗ ${res.status} ${t}`.trim(); ind.classList.add('error');
          });
        }
      }
    }

    function todayTotal(item) {
      return (item.log || []).filter(e => e.date === today).reduce((s, e) => s + (parseInt(e.note) || 0), 0);
    }

    function fmtCount(val, unit) {
      return unit === 'min' ? `${val}m` : `${val}`;
    }

    function renderCheckinSection(items, todayCheckin) {
      const section = document.getElementById('checkin-section');
      const byName = Object.fromEntries(items.map(it => [it.name, it]));
      const childSet = new Set(items.flatMap(it => it.children || []));

      function slug(name) { return name.replace(/[^a-zA-Z0-9]/g, '_'); }

      function renderItem(it) {
        const s = slug(it.name);
        if (it.input_type === 'counter') {
          const total = todayTotal(it);
          const label = fmtCount(total, it.step_unit);
          return `<div class="ci-row" id="ci-row-${s}">
            <span class="ci-name">${it.name}</span>
            <span class="ci-indicator" id="ci-ind-${s}"></span>
            <div class="ci-counter">
              <button class="ci-counter-btn" data-item="${it.name}" data-step="-${it.step_size}" data-unit="${it.step_unit}" data-slug="${s}">−</button>
              <span class="ci-counter-val" id="ci-val-${s}" data-raw="${total}">${label}</span>
              <button class="ci-counter-btn" data-item="${it.name}" data-step="${it.step_size}" data-unit="${it.step_unit}" data-slug="${s}">+</button>
            </div>
          </div>`;
        } else if (it.input_type === 'slider') {
          const todayLogs = (it.log || []).filter(e => e.date === today);
          const val = todayLogs.length ? (parseInt(todayLogs[0].note) || it.range_min) : Math.round((it.range_min + it.range_max) / 2);
          return `<div class="ci-row" id="ci-row-${s}">
            <span class="ci-name">${it.name}</span>
            <span class="ci-indicator" id="ci-ind-${s}"></span>
            <div class="ci-slider">
              <input type="range" class="ci-slider-input" min="${it.range_min}" max="${it.range_max}" value="${val}" data-item="${it.name}" data-slug="${s}">
              <span class="ci-slider-val" id="ci-slval-${s}">${val}</span>
            </div>
          </div>`;
        } else {
          const todayLogs = (it.log || []).filter(e => e.date === today);
          const doneToday = todayLogs.length && todayLogs[0].note === 'Done';
          return `<div class="ci-row" id="ci-row-${s}">
            <button class="ci-toggle${doneToday ? ' on' : ''}" data-item="${it.name}" data-slug="${s}"></button>
            <span class="ci-name">${it.name}</span>
            <span class="ci-indicator" id="ci-ind-${s}"></span>
          </div>`;
        }
      }

      let html = '';
      const topLevel = items.filter(i => i.name !== 'Stick with the process' && !childSet.has(i.name));

      topLevel.forEach(it => {
        if (it.input_type === 'goal') {
          html += `<div class="ci-group"><div class="ci-group-header">${it.name}</div>`;
          (it.children || []).forEach(childName => {
            const child = byName[childName];
            if (child) html += renderItem(child);
          });
          html += `</div>`;
        } else {
          html += renderItem(it);
        }
      });

      // Add item form
      const parentOptions = items.filter(i => i.input_type === 'goal')
        .map(i => `<option value="${i.name}">${i.name}</option>`).join('');
      html += `<div class="ci-extra" id="add-item-section" style="margin-top:0.75rem">
        <div class="ci-extra-header" onclick="this.parentElement.classList.toggle('open')">
          <span class="ci-extra-title" style="color:#555b66;font-size:0.85rem">+ Add item</span>
        </div>
        <div class="ci-extra-body" style="padding-top:0.75rem">
          <input class="form-input" id="new-item-name" placeholder="Name" style="margin-bottom:0.5rem">
          <select class="form-input" id="new-item-type" style="margin-bottom:0.5rem;background:#0f1117">
            <option value="boolean">Toggle (boolean)</option>
            <option value="counter">Counter (+/−)</option>
            <option value="slider">Slider (range)</option>
            <option value="goal">Goal / Intention (no widget)</option>
          </select>
          <select class="form-input" id="new-item-cadence" style="margin-bottom:0.5rem;background:#0f1117">
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="monthly">Monthly</option>
            <option value="ongoing">Ongoing</option>
          </select>
          <div id="new-item-counter-opts" style="display:none;gap:0.5rem;margin-bottom:0.5rem">
            <input class="form-input" id="new-item-step" type="number" placeholder="Step size" style="width:49%;display:inline-block">
            <input class="form-input" id="new-item-unit" placeholder="Unit (min, species…)" style="width:49%;display:inline-block">
          </div>
          <div id="new-item-slider-opts" style="display:none;gap:0.5rem;margin-bottom:0.5rem">
            <input class="form-input" id="new-item-rmin" type="number" placeholder="Min" value="1" style="width:30%;display:inline-block">
            <input class="form-input" id="new-item-rmax" type="number" placeholder="Max" value="10" style="width:30%;display:inline-block">
          </div>
          ${parentOptions ? `<select class="form-input" id="new-item-parent" style="margin-bottom:0.5rem;background:#0f1117"><option value="">No parent</option>${parentOptions}</select>` : ''}
          <button class="ci-submit" id="new-item-submit">Add item</button>
          <div class="ci-msg" id="new-item-msg"></div>
        </div>
      </div>`;

      section.innerHTML = html;

      // Wire type select → show/hide extra fields
      const typeSelect = document.getElementById('new-item-type');
      typeSelect.onchange = () => {
        document.getElementById('new-item-counter-opts').style.display = typeSelect.value === 'counter' ? 'flex' : 'none';
        document.getElementById('new-item-slider-opts').style.display = typeSelect.value === 'slider' ? 'flex' : 'none';
      };

      document.getElementById('new-item-submit').onclick = async () => {
        const name = document.getElementById('new-item-name').value.trim();
        if (!name) return;
        const body = {
          name,
          input_type: typeSelect.value,
          cadence: document.getElementById('new-item-cadence').value,
          step_size: parseInt(document.getElementById('new-item-step')?.value) || 0,
          step_unit: document.getElementById('new-item-unit')?.value || '',
          range_min: parseInt(document.getElementById('new-item-rmin')?.value) || 1,
          range_max: parseInt(document.getElementById('new-item-rmax')?.value) || 10,
          parent_name: document.getElementById('new-item-parent')?.value || null,
        };
        const res = await fetch('/api/items', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
        const msg = document.getElementById('new-item-msg');
        if (res.ok) {
          msg.textContent = '✓ Added — reloading…'; msg.classList.remove('error');
          setTimeout(() => location.reload(), 800);
        } else {
          msg.textContent = '✗ Failed'; msg.classList.add('error');
        }
      };

      // Wire toggles
      document.querySelectorAll('.ci-toggle').forEach(toggle => {
        toggle.onclick = async () => {
          const isOn = toggle.classList.contains('on');
          toggle.classList.toggle('on');
          const ind = document.getElementById(`ci-ind-${toggle.dataset.slug}`);
          await autoSaveLog(toggle.dataset.item, isOn ? 'Undone' : 'Done', ind);
        };
      });

      // Wire counter buttons
      document.querySelectorAll('.ci-counter-btn').forEach(btn => {
        btn.onclick = async () => {
          const step = parseInt(btn.dataset.step);
          const s = btn.dataset.slug;
          const valEl = document.getElementById(`ci-val-${s}`);
          const ind = document.getElementById(`ci-ind-${s}`);
          const curRaw = parseInt(valEl.dataset.raw || '0');
          const next = Math.max(0, curRaw + step);
          if (next === curRaw && step < 0) return;
          valEl.dataset.raw = next;
          valEl.textContent = fmtCount(next, btn.dataset.unit);
          await autoSaveLog(btn.dataset.item, String(step), ind);
        };
      });

      // Wire sliders — save on release
      const sliderTimers = {};
      document.querySelectorAll('.ci-slider-input').forEach(input => {
        const s = input.dataset.slug;
        const valEl = document.getElementById(`ci-slval-${s}`);
        input.oninput = () => { if (valEl) valEl.textContent = input.value; };
        input.onchange = () => {
          clearTimeout(sliderTimers[s]);
          sliderTimers[s] = setTimeout(() => {
            const ind = document.getElementById(`ci-ind-${s}`);
            autoSaveLog(input.dataset.item, input.value, ind);
          }, 600);
        };
      });
    }

    /* ── Tracker rows ── */
    function renderRow(item) {
      const row = document.createElement('tr');
      row.className = 'row';
      const nameExtra = item.url ? ` <a href="${item.url}" target="_blank">\u2197</a>` : '';
      const ms = (item.milestones||[]).map(m => `<span class="milestone-tag">${m.label}</span>`).join('') || '<span style="color:#2a2d3a">\u2014</span>';
      row.innerHTML = `<td class="col-chevron">\u25B8</td><td class="col-name">${item.name}${nameExtra}</td><td class="col-momentum momentum-${item.momentum}">${MOMENTUM_ARROWS[item.momentum]||'\u00b7'} ${item.momentum}</td><td class="col-milestones">${ms}</td><td class="col-updated">${fmtDate(item.last_updated)}</td>`;
      const det = document.createElement('tr');
      det.className = 'detail-row hidden';
      const logs = (item.log||[]).map(e => `<div class="log-entry ${e.type==='recommendation'?'log-rec':''}"><span class="log-date">${fmtDate(e.date)}</span>${e.note}</div>`).join('') || '<div class="log-entry" style="color:#bcc3cd">No entries yet.</div>';
      let left = `<div class="detail-label">Focus</div><div class="detail-text">${item.focus||'\u2014'}</div><div class="detail-label">Next step</div><div class="detail-text">${item.next||'\u2014'}</div>`;
      if (item.target_date) left += `<div class="detail-label">Target</div><div class="detail-text">${fmtTarget(item.target_date)}</div>`;
      if (item.success_criteria) left += `<div class="detail-label">Success criteria</div><div class="detail-text">${item.success_criteria}</div>`;
      let right = `<div class="detail-label">Log</div>${logs}`;
      if ((item.milestones||[]).length) {
        right += `<div class="detail-label" style="margin-top:0.75rem">Milestones</div>`;
        right += item.milestones.map(m => `<div class="log-entry"><span class="log-date">${fmtDate(m.date)}</span><span style="color:#34d399">${m.label}</span></div>`).join('');
      }
      det.innerHTML = `<td colspan="5"><div class="detail-grid"><div>${left}</div><div>${right}</div></div></td>`;
      row.onclick = e => { if (e.target.tagName !== 'A') { row.classList.toggle('expanded'); det.classList.toggle('hidden'); } };
      return [row, det];
    }

    function renderWins(wins) {
      if (!wins || !wins.length) return;
      document.getElementById('wins-section').classList.remove('hidden');
      const list = document.getElementById('wins-list');
      wins.forEach(w => {
        const li = document.createElement('li');
        li.className = 'win-item';
        li.innerHTML = `<span class="win-icon">\u2605</span><span class="win-date">${fmtDate(w.date)}</span><span>${w.note}</span>`;
        list.appendChild(li);
      });
    }

    /* ── Activity log ── */
    function renderActivityLog(items, checkins, limit) {
      const PAGE = limit || 20;
      const all = [];
      items.forEach(it => (it.log || []).forEach(l => all.push({ id: l.id, date: l.date, item: it.name, note: l.note, isCheckin: false })));
      (checkins || []).forEach(c => {
        if (c.body != null || c.mind != null || c.social != null) {
          const note = [`body:${c.body}`, `mind:${c.mind}`, `social:${c.social}`].filter(s => !s.endsWith('null')).join(' ');
          all.push({ id: c.id, date: c.date, item: 'Check-in', note, isCheckin: true });
        }
      });
      // Sort by date desc; within same date check-ins first (most recent save), then logs by id desc
      all.sort((a, b) => {
        const dateDiff = b.date.localeCompare(a.date);
        if (dateDiff !== 0) return dateDiff;
        if (a.isCheckin !== b.isCheckin) return a.isCheckin ? -1 : 1;
        return b.id - a.id;
      });

      const container = document.getElementById('activity-log');
      container.innerHTML = '';
      if (!all.length) { container.innerHTML = '<div class="al-entry" style="color:#555b66">No activity yet.</div>'; return; }

      all.slice(0, PAGE).forEach(e => {
        const div = document.createElement('div');
        div.className = 'al-entry';
        div.innerHTML = `<span class="al-date">${e.date}</span><span class="al-item">${e.item}</span><span class="al-note">${e.note}</span>`;
        container.appendChild(div);
      });

      if (all.length > PAGE) {
        const btn = document.createElement('button');
        btn.className = 'al-more';
        btn.textContent = `Show more (${all.length - PAGE} remaining)`;
        btn.onclick = () => renderActivityLog(items, checkins, PAGE + 20);
        container.appendChild(btn);
      }
    }

    /* ── Load ── */
    Promise.all([
      fetch('/api/items').then(r => { if (r.status === 401) throw new Error('unauthorized'); return r.json(); }),
      fetch('/api/checkins').then(r => r.ok ? r.json() : [])
    ]).then(([items, checkins]) => {
      items.sort((a, b) => a.display_order - b.display_order || a.name.localeCompare(b.name));
      window._items = items;
      const todayCheckin = checkins.find(c => c.date === today) || null;
      renderCheckinSection(items, todayCheckin);
      renderActivityLog(items, checkins);
    }).catch(err => {
      if (err.message === 'unauthorized') showLogin();
      else console.error(err);
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
  </script>
</body>
</html>
